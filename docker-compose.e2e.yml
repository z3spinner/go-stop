# Isolated end-to-end test stack (project: gostop-e2e).
#
#   make test-e2e
#
# No host ports are published. `app` is the production image (self-contained
# SvelteKit SPA + Go API), so there is no host-side build — avoiding the
# root-owned .svelte-kit/web/build artifacts the dev container leaves behind.
# Playwright runs as a container and drives `app` by name on the private network.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gostop
      POSTGRES_PASSWORD: gostop
      POSTGRES_DB: gostop
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gostop"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      target: production
    command: sh -c "./migratedb up && ./go-stop"
    environment:
      DATABASE_URL: postgres://gostop:gostop@db:5432/gostop?sslmode=disable
      SITE_NAME: "Go Stop Saillans!"
      SERVICE_TZ: Europe/Paris
      PORT: "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/config || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    depends_on:
      db:
        condition: service_healthy

  tests:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    working_dir: /work
    # Share the app's network namespace so the suite reaches it at
    # http://localhost:8080. Chromium exempts localhost from its automatic
    # http→https upgrade (which otherwise fails against the TLS-less app); a
    # by-name host like app:8080 would be upgraded and hit ERR_SSL_PROTOCOL_ERROR.
    # npm ci installs @playwright/test (browsers are already in the image).
    network_mode: "service:app"
    command: sh -c "npm ci && npx playwright test"
    environment:
      E2E_BASE_URL: http://localhost:8080
    volumes:
      - .:/work
      - e2e-node-modules:/work/node_modules
    depends_on:
      app:
        condition: service_healthy

volumes:
  e2e-node-modules:
