# Override for integration tests — replaces the persistent volume with tmpfs
# (data lives only in RAM, disappears when the container stops).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up db -d
#   TEST_DATABASE_URL=postgres://gostop:gostop@localhost:5432/gostop?sslmode=disable \
#     go test -tags integration ./...
#   docker compose -f docker-compose.yml -f docker-compose.test.yml down

services:
  db:
    volumes:
      - type: tmpfs
        target: /var/lib/postgresql/data
