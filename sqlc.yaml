version: "2"
sql:
  - schema: "internal/infrastructure/postgres/sqlc/migrations"
    queries: "internal/infrastructure/postgres/sqlc/queries/sql"
    engine: "postgresql"
    gen:
      go:
        package: "queries"
        out: "internal/infrastructure/postgres/sqlc/queries"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_db_tags: true
