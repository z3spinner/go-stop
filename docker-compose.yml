# Devstack (DB is tmpfs — data lost on stop):
#   docker compose up --build
#
#   Open the app at http://localhost:5173  (SvelteKit/Vite dev server, hot-reload).
#   The Go API runs on http://localhost:8080; Vite proxies /api -> app:8080.
#   Both frontend (frontend/) and Go (*.go) source hot-reload on save.
#   After changing frontend dependencies: `docker compose up --build`, or
#   `docker compose down -v` to reset the cached node_modules volume.
#
# Integration tests:
#   docker compose up db migrations -d
#   TEST_DATABASE_URL=postgres://gostop:gostop@localhost:5432/gostop?sslmode=disable \
#     go test -tags integration ./...
#   docker compose down

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gostop
      POSTGRES_PASSWORD: gostop
      POSTGRES_DB: gostop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gostop"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      target: development
    command: sh -c "go run ./cmd/migratedb up"
    environment:
      DATABASE_URL: postgres://gostop:gostop@db:5432/gostop?sslmode=disable
    volumes:
      - .:/app
      - go-cache:/root/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: development
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gostop:gostop@db:5432/gostop?sslmode=disable
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:dev@localhost}
      SITE_NAME: ${SITE_NAME:-Go-Stop}
      RIDE_GRACE_MINUTES: ${RIDE_GRACE_MINUTES:-60}
      SERVICE_TZ: ${SERVICE_TZ:-Europe/Paris}
      PORT: "8080"
    volumes:
      - .:/app
      - go-cache:/root/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

  frontend:
    image: node:22-alpine
    working_dir: /app
    # npm install is a near no-op once the node_modules volume is warm; it also
    # pulls the musl-native esbuild/rollup binaries the alpine container needs.
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://app:8080
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  go-cache:
  frontend_node_modules:
