# Devstack (DB is tmpfs — data lost on stop):
#   docker compose up --build
#
# Integration tests:
#   docker compose up db migrations -d
#   TEST_DATABASE_URL=postgres://gostop:gostop@localhost:5432/gostop?sslmode=disable \
#     go test -tags integration ./...
#   docker compose down

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gostop
      POSTGRES_PASSWORD: gostop
      POSTGRES_DB: gostop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gostop"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      target: development
    command: sh -c "go run ./cmd/migratedb up"
    environment:
      DATABASE_URL: postgres://gostop:gostop@db:5432/gostop?sslmode=disable
    volumes:
      - .:/app
      - go-cache:/root/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: development
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gostop:gostop@db:5432/gostop?sslmode=disable
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL:-mailto:dev@localhost}
      SITE_NAME: ${SITE_NAME:-Go-Stop}
      RIDE_GRACE_MINUTES: ${RIDE_GRACE_MINUTES:-60}
      SERVICE_TZ: ${SERVICE_TZ:-Europe/Paris}
      PORT: "8080"
    volumes:
      - .:/app
      - go-cache:/root/go/pkg/mod
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  go-cache:
